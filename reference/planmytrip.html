<script>
(function() {
  function initSliders() {
    // Find all slider containers (converted from slider-component)
    var sliderContainers = document.querySelectorAll('[data-original-tag="slider-component"]');

    sliderContainers.forEach(function(container) {
      var slider = container.querySelector('.slider');
      if (!slider) return;

      var slides = slider.querySelectorAll('.slider__slide');
      if (slides.length === 0) return;

      var prevBtn = container.querySelector('.slider-button--prev');
      var nextBtn = container.querySelector('.slider-button--next');
      var counterCurrent = container.querySelector('.slider-counter--current');
      var counterTotal = container.querySelector('.slider-counter--total');
      var currentIndex = 0;

      // Find initially active slide
      slides.forEach(function(slide, i) {
        if (slide.classList.contains('is-active')) currentIndex = i;
      });

      function goToSlide(index, shouldScroll) {
        if (index < 0) index = 0;
        if (index >= slides.length) index = slides.length - 1;
        currentIndex = index;

        // Update active class
        slides.forEach(function(slide, i) {
          slide.classList.toggle('is-active', i === currentIndex);
        });

        // Scroll the slide into view (only on user-initiated navigation)
        if (shouldScroll && slides[currentIndex]) {
          slides[currentIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'start' });
        }

        // Update counter
        if (counterCurrent) counterCurrent.textContent = currentIndex + 1;

        // Update button states
        if (prevBtn) prevBtn.disabled = currentIndex === 0;
        if (nextBtn) nextBtn.disabled = currentIndex === slides.length - 1;

        // Update corresponding thumbnail
        var thumbnailContainer = container.parentElement && container.parentElement.querySelector('.thumbnail-slider, .thumbnail-list');
        if (thumbnailContainer) {
          var thumbnails = thumbnailContainer.querySelectorAll('.thumbnail-list__item');
          thumbnails.forEach(function(thumb, i) {
            var btn = thumb.querySelector('button');
            if (btn) btn.setAttribute('aria-current', i === currentIndex ? 'true' : 'false');
          });
        }
      }

      // Bind prev/next buttons
      if (prevBtn) {
        prevBtn.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          goToSlide(currentIndex - 1, true);
        });
      }
      if (nextBtn) {
        nextBtn.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          goToSlide(currentIndex + 1, true);
        });
      }

      // Bind thumbnail clicks
      var thumbContainer = container.parentElement && container.parentElement.querySelector('.thumbnail-list');
      if (thumbContainer) {
        var thumbButtons = thumbContainer.querySelectorAll('.thumbnail-list__item button');
        thumbButtons.forEach(function(btn, i) {
          btn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            goToSlide(i, true);
          });
        });
      }

      // Initialize state (no scroll on init to prevent auto-scrolling to slider)
      goToSlide(currentIndex, false);
    });
  }

  // Run after DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initSliders);
  } else {
    initSliders();
  }
  // Also run after a delay for dynamically loaded content
  setTimeout(initSliders, 1000);
})();
</script>
